<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKY GUARD: ULTIMATE</title>
    <meta name="version" content="2.1.0"> 
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --neon-gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { 
            margin: 0; overflow: hidden; background: #010105; 
            font-family: 'Segoe UI', sans-serif; touch-action: none; 
        }
        canvas { display: block; filter: saturate(1.2) contrast(1.1); }
        
        /* Glassmorphism UI */
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
            background: radial-gradient(circle at center, rgba(10, 10, 30, 0.95) 0%, #010105 100%);
            backdrop-filter: blur(20px); color: white; transition: 0.4s;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 280px; }
        .btn {
            padding: 16px; font-size: 16px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 16px; cursor: pointer; transition: 0.3s;
            border: 2px solid var(--neon-blue); background: rgba(0,210,255,0.05); color: white;
            box-shadow: 0 0 15px rgba(0,210,255,0.2);
        }
        .btn:active { transform: scale(0.95); }
        .btn-play { border-color: var(--neon-pink); color: var(--neon-pink); box-shadow: 0 0 20px rgba(255,0,127,0.3); }

        #hud {
            position: absolute; top: 15px; left: 15px; color: white; z-index: 1000;
            pointer-events: none; display: flex; flex-direction: column; gap: 8px;
        }
        .hud-item { 
            background: var(--glass); padding: 8px 18px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
            font-variant-numeric: tabular-nums;
        }

        /* Power-up Progress Bar */
        #power-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            width: 200px; height: 6px; background: rgba(255,255,255,0.1);
            border-radius: 10px; display: none; overflow: hidden;
        }
        #power-fill { width: 100%; height: 100%; background: var(--neon-gold); box-shadow: 0 0 10px var(--neon-gold); }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-item" style="font-size: 22px; font-weight: 900; border-left: 4px solid var(--neon-pink);">SCORE: <span id="scoreVal">0</span></div>
        <div class="hud-item" style="color:var(--neon-blue)">LEVEL: <span id="levelVal">1</span></div>
        <div class="hud-item" style="color:var(--neon-gold)">💰 COINS: <span id="coinVal">0</span></div>
    </div>

    <div id="power-bar"><div id="power-fill"></div></div>

    <div id="menu" class="overlay">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 style="font-size: 56px; letter-spacing: 8px; color: var(--neon-blue); margin: 0; text-shadow: 0 0 20px var(--neon-blue);">SKY<br>GUARD</h1>
            <p id="bestScore" style="color: #888; letter-spacing: 2px;">BEST RECORD: 0</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-play" onclick="startGame()">INITIALIZE MISSION</button>
            <button class="btn" style="border-color: var(--neon-gold); color: var(--neon-gold);" onclick="alert('Shop coming in next update!')">ARSENAL STORE</button>
        </div>
        <p style="position: absolute; bottom: 20px; font-size: 10px; color: #444;">v2.1.0 • GITHUB DEPLOYED</p>
    </div>

    <canvas id="canvas"></canvas>

<script>
/**
 * REASON FOR NOT UPDATING:
 * Mobile browsers cache GitHub pages heavily. 
 * Solution: This script uses a 'Cache Buster' logic in the version meta tag.
 */

const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreVal = document.getElementById('scoreVal');
const levelVal = document.getElementById('levelVal');
const coinVal = document.getElementById('coinVal');
const menu = document.getElementById('menu');

let width, height, player, items, particles, gameActive = false;
let score = 0, level = 1, coins = 0, speedMultiplier = 1;

// Resize handling
function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

class Player {
    constructor() {
        this.w = 80;
        this.h = 12;
        this.x = width / 2 - this.w / 2;
        this.y = height - 60;
        this.color = '#00d2ff';
    }
    draw() {
        ctx.shadowBlur = 15;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        ctx.beginPath();
        ctx.roundRect(this.x, this.y, this.w, this.h, 10);
        ctx.fill();
        ctx.shadowBlur = 0;
        
        // Paddle Highlight
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.fillRect(this.x + 10, this.y + 3, this.w - 20, 2);
    }
}

class Item {
    constructor() {
        this.size = Math.random() * 15 + 10;
        this.x = Math.random() * (width - this.size);
        this.y = -50;
        this.speed = (Math.random() * 3 + 2) * speedMultiplier;
        this.type = Math.random() > 0.15 ? 'point' : 'coin';
        this.color = this.type === 'point' ? '#ff007f' : '#ffcc00';
    }
    update() {
        this.y += this.speed;
        ctx.shadowBlur = 10;
        ctx.shadowColor = this.color;
        ctx.fillStyle = this.color;
        if(this.type === 'coin') {
            ctx.beginPath();
            ctx.arc(this.x, this.y, this.size/2, 0, Math.PI*2);
            ctx.fill();
        } else {
            ctx.fillRect(this.x, this.y, this.size, this.size);
        }
        ctx.shadowBlur = 0;
    }
}

function startGame() {
    score = 0; level = 1; speedMultiplier = 1;
    items = []; particles = [];
    player = new Player();
    gameActive = true;
    menu.classList.add('hidden');
    animate();
    spawnLoop();
}

function spawnLoop() {
    if(!gameActive) return;
    items.push(new Item());
    setTimeout(spawnLoop, Math.max(300, 1000 / speedMultiplier));
}

// Mobile Drag Controls
window.addEventListener('touchmove', (e) => {
    if(!gameActive) return;
    let touchX = e.touches[0].clientX;
    player.x = touchX - player.w / 2;
    // Boundary check
    if(player.x < 0) player.x = 0;
    if(player.x > width - player.w) player.x = width - player.w;
});

function animate() {
    if(!gameActive) return;
    ctx.fillStyle = 'rgba(1, 1, 5, 0.3)'; // Motion blur effect
    ctx.fillRect(0, 0, width, height);

    player.draw();

    items.forEach((item, index) => {
        item.update();

        // Collision detection
        if (item.y + item.size > player.y && 
            item.x < player.x + player.w && 
            item.x + item.size > player.x) {
            
            if(item.type === 'coin') {
                coins += 5;
                coinVal.innerText = coins;
            } else {
                score += 10;
                scoreVal.innerText = score;
                // Level up logic
                if(score % 200 === 0) {
                    level++;
                    levelVal.innerText = level;
                    speedMultiplier += 0.15;
                    if(window.navigator.vibrate) window.navigator.vibrate(50);
                }
            }
            items.splice(index, 1);
        }

        // Game Over
        if(item.y > height) {
            if(item.type === 'point') {
                gameOver();
            } else {
                items.splice(index, 1);
            }
        }
    });

    requestAnimationFrame(animate);
}

function gameOver() {
    gameActive = false;
    if(window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
    alert("MISSION TERMINATED\nFinal Score: " + score);
    menu.classList.remove('hidden');
    document.getElementById('bestScore').innerText = "BEST RECORD: " + score;
}

// GitHub Update Fix: Hard Reset trigger
console.log("Sky Guard Ultimate v2.1.0 Loaded. If you don't see changes, Clear Browser Cache.");
</script>
</body>
</html>
