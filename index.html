<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SKY GUARD: MULTIVERSE</title>
    <meta name="version" content="3.0.0"> 
    <style>
        :root {
            --neon-blue: #00d2ff;
            --neon-pink: #ff007f;
            --neon-gold: #ffcc00;
            --glass: rgba(255, 255, 255, 0.1);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        html, body { 
            margin: 0; overflow: hidden; background: #010105; 
            font-family: 'Segoe UI', sans-serif; touch-action: none; 
        }
        canvas { display: block; filter: saturate(1.2) contrast(1.1); }
        
        .overlay {
            position: absolute; inset: 0; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 2000;
            background: radial-gradient(circle at center, rgba(10, 10, 30, 0.95) 0%, #010105 100%);
            backdrop-filter: blur(20px); color: white; transition: 0.4s;
        }
        .hidden { opacity: 0; pointer-events: none; transform: scale(1.1); }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 280px; }
        .btn {
            padding: 16px; font-size: 16px; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 16px; cursor: pointer; transition: 0.3s;
            border: 2px solid var(--neon-blue); background: rgba(0,210,255,0.05); color: white;
            box-shadow: 0 0 15px rgba(0,210,255,0.2);
        }
        .btn:active { transform: scale(0.95); }
        .btn-play { border-color: var(--neon-pink); color: var(--neon-pink); }
        .btn-switch { border-color: #a020f0; color: #a020f0; } /* Purple color for new game */

        #hud {
            position: absolute; top: 15px; left: 15px; color: white; z-index: 1000;
            pointer-events: none; display: flex; flex-direction: column; gap: 8px;
        }
        .hud-item { 
            background: var(--glass); padding: 8px 18px; border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); backdrop-filter: blur(5px);
        }
    </style>
</head>
<body>

    <div id="hud">
        <div class="hud-item" style="font-size: 22px; font-weight: 900; border-left: 4px solid var(--neon-pink);">SCORE: <span id="scoreVal">0</span></div>
        <div class="hud-item" id="modeLabel" style="color:var(--neon-blue)">MODE: SKY GUARD</div>
    </div>

    <div id="menu" class="overlay">
        <div style="text-align: center; margin-bottom: 40px;">
            <h1 id="menuTitle" style="font-size: 46px; letter-spacing: 5px; color: var(--neon-blue); margin: 0;">SKY GUARD</h1>
            <p id="bestScore" style="color: #888;">READY FOR MISSION?</p>
        </div>
        <div class="btn-group">
            <button class="btn btn-play" id="mainPlayBtn" onclick="startGame()">START MISSION</button>
            <button class="btn btn-switch" onclick="toggleGameMode()">🚀 SWITCH TO SPACE ATTACK</button>
            <button class="btn" style="border-color: var(--neon-gold); color: var(--neon-gold);" onclick="alert('Store coming soon!')">ARSENAL</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

<script>
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const scoreVal = document.getElementById('scoreVal');
const menu = document.getElementById('menu');
const modeLabel = document.getElementById('modeLabel');

let width, height, player, items, gameActive = false;
let score = 0, speedMultiplier = 1;
let currentGameMode = "SKY_GUARD"; // Modes: SKY_GUARD or SPACE_ATTACK

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

// --- PUREL NEW GAME LOGIC (Space Attack) ---
class Bullet {
    constructor(x, y) {
        this.x = x; this.y = y; this.r = 4; this.speed = 10;
    }
    update() { this.y -= this.speed; }
    draw() {
        ctx.fillStyle = '#fff';
        ctx.beginPath(); ctx.arc(this.x, this.y, this.r, 0, Math.PI*2); ctx.fill();
    }
}

// --- ORIGINAL GAME CLASSES (Sky Guard) ---
class Player {
    constructor() {
        this.w = 80; this.h = 12;
        this.x = width/2 - 40; this.y = height - 60;
        this.bullets = [];
    }
    draw() {
        ctx.fillStyle = currentGameMode === "SKY_GUARD" ? '#00d2ff' : '#ff007f';
        ctx.beginPath(); ctx.roundRect(this.x, this.y, this.w, this.h, 10); ctx.fill();
        if(currentGameMode === "SPACE_ATTACK") {
            // Add a "Ship" look
            ctx.fillRect(this.x + 35, this.y - 10, 10, 10);
        }
    }
}

class Item {
    constructor() {
        this.size = Math.random() * 20 + 15;
        this.x = Math.random() * (width - this.size);
        this.y = -50;
        this.speed = (Math.random() * 2 + 2) * speedMultiplier;
        this.health = 3; // For Space Mode
    }
    update() { this.y += this.speed; }
    draw() {
        ctx.fillStyle = currentGameMode === "SKY_GUARD" ? '#ff007f' : '#33ff33';
        if(currentGameMode === "SKY_GUARD") {
            ctx.fillRect(this.x, this.y, this.size, this.size);
        } else {
            // Meteor look for Space Mode
            ctx.beginPath(); ctx.arc(this.x + 10, this.y + 10, 15, 0, Math.PI*2); ctx.fill();
        }
    }
}

// --- CORE CONTROLS ---
function toggleGameMode() {
    if(currentGameMode === "SKY_GUARD") {
        currentGameMode = "SPACE_ATTACK";
        document.getElementById('menuTitle').innerText = "SPACE ATTACK";
        document.getElementById('menuTitle').style.color = "#ff007f";
        modeLabel.innerText = "MODE: SPACE ATTACK";
    } else {
        currentGameMode = "SKY_GUARD";
        document.getElementById('menuTitle').innerText = "SKY GUARD";
        document.getElementById('menuTitle').style.color = "#00d2ff";
        modeLabel.innerText = "MODE: SKY GUARD";
    }
}

function startGame() {
    score = 0; scoreVal.innerText = "0";
    speedMultiplier = 1; items = []; player = new Player();
    gameActive = true;
    menu.classList.add('hidden');
    
    if(currentGameMode === "SPACE_ATTACK") {
        // Auto-shoot for space mode
        shootInterval = setInterval(() => {
            if(gameActive) player.bullets.push(new Bullet(player.x + player.w/2, player.y));
        }, 300);
    }
    
    animate();
    spawnLoop();
}

let shootInterval;
function spawnLoop() {
    if(!gameActive) return;
    items.push(new Item());
    setTimeout(spawnLoop, 1000 / speedMultiplier);
}

window.addEventListener('touchmove', (e) => {
    if(!gameActive) return;
    player.x = e.touches[0].clientX - player.w/2;
});

function animate() {
    if(!gameActive) { clearInterval(shootInterval); return; }
    ctx.fillStyle = 'rgba(1,1,5,0.4)';
    ctx.fillRect(0,0,width,height);

    player.draw();

    // Space Attack Bullet Logic
    if(currentGameMode === "SPACE_ATTACK") {
        player.bullets.forEach((b, bi) => {
            b.update(); b.draw();
            if(b.y < 0) player.bullets.splice(bi, 1);
        });
    }

    items.forEach((item, index) => {
        item.update();
        item.draw();

        // SKY GUARD Collision (Catching)
        if (currentGameMode === "SKY_GUARD") {
            if (item.y + item.size > player.y && item.x < player.x + player.w && item.x + item.size > player.x) {
                score += 10; scoreVal.innerText = score;
                items.splice(index, 1);
                speedMultiplier += 0.05;
            }
            if(item.y > height) gameOver();
        } 
        
        // SPACE ATTACK Collision (Shooting)
        else {
            player.bullets.forEach((b, bi) => {
                if(b.x > item.x && b.x < item.x + 30 && b.y < item.y + 30) {
                    score += 20; scoreVal.innerText = score;
                    items.splice(index, 1);
                    player.bullets.splice(bi, 1);
                }
            });
            if(item.y + 20 > player.y && item.x < player.x + player.w && item.x + 20 > player.x) gameOver();
            if(item.y > height) items.splice(index, 1);
        }
    });

    requestAnimationFrame(animate);
}

function gameOver() {
    gameActive = false;
    alert("GAME OVER! Score: " + score);
    menu.classList.remove('hidden');
}
</script>
</body>
</html>
